services:
  # Backend API
  - type: web
    name: food-delivery-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run migrate:deploy && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: food-delivery-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend Client
  - type: web
    name: food-delivery-client
    env: node
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: food-delivery-api
          property: url
      - key: AI_API_URL
        value: https://nonmendicant-transcultural-porsche.ngrok-free.dev/v1/chat/completions
        # Note: If the API URL ends with /api, you might need to append it.
        # Render's service url property doesn't include the path.
        # But our client/src/services/api.ts appends /api if missing? 
        # Actually it uses BASE_URL/endpoint.
        # If API_URL is https://foo.onrender.com, then it fetch https://foo.onrender.com/endpoint.
        # Our server index.ts defines routes at /api.
        # So NEXT_PUBLIC_API_URL should be https://foo.onrender.com/api

databases:
  - name: food-delivery-db
    plan: free
